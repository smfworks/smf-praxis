name: Release

# Build, validate, and publish artifacts to a GitHub Release.
# Push a version tag (vX.Y.Z) to release; workflow_dispatch builds without attaching artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Verify the wheel bundles the dashboard assets
        run: |
          python - <<'PY'
          import glob, sys, zipfile
          whl = glob.glob("dist/*.whl")[0]
          web = [n for n in zipfile.ZipFile(whl).namelist() if "/web/" in n]
          print(f"dashboard assets in wheel: {len(web)}")
          sys.exit(0 if web else 1)
          PY
      - name: Verify the tag matches the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os, sys
          import hybridagent
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          ver = hybridagent.__version__
          print(f"tag={tag} __version__={ver}")
          sys.exit(0 if tag == ver else 1)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a real version tag, never on a manual dry-run build.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # attach artifacts to the GitHub Release for the tag
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Attach wheel + sdist to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
    # NOTE: PyPI publishing is intentionally not in this workflow. PyPI
    # trusted publishing requires the project to exist on PyPI first
    # (first release must use an API token) and there is no stored token.
    # Until that is set up, releases live on GitHub Releases and users
    # install from the release URL:
    #   pip install https://github.com/smfworks/smf-praxis/releases/download/vX.Y.Z/praxis_agent-X.Y.Z-py3-none-any.whl
    # To switch to PyPI later: create the project on PyPI with an API
    # token, store PYPI_API_TOKEN as a repo secret, and replace this
    # publish job with pypa/gh-action-pypi-publish (password-token mode).
