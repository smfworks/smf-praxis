name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # HEAD + parent for the version-bumped check (H06)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy hybridagent
      - name: Architectural rules (H06)
        run: python scripts/check_architecture.py
        # Enforce the AGENTS.md hard constraints as executable checks:
        # WIP=1, version-bumped-on-hybridagent-changes, dependency-free
        # core, governance-spine-present. Fails CI if any rule is violated.

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python range on Linux; a representative 3.12 run on Windows + macOS
        # so platform-specific bugs (subprocess, pipes, sockets, paths, signals)
        # are caught without a 9-cell matrix.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage gate (Linux)
        if: runner.os == 'Linux'
        run: pytest -q --cov=hybridagent --cov-report=term-missing --cov-fail-under=80
      - name: Run tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: pytest -q
      - name: Smoke-test demo + CLI
        run: |
          python demo.py
          praxis demo

  artifact-renderers:
    # Optional document backends remain outside core, but must render and
    # validate real Office/PDF files on every supported desktop platform.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Artifact Studio backends
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,artifacts]"
      - name: Render and validate professional artifacts
        run: pytest -o addopts='' -q tests/test_artifact_models.py tests/test_artifact_renderers.py

  install-script:
    # Exercise the one-command bootstrap on Linux + macOS so the documented
    # install path (LF line endings, executable bit, venv layout) can't silently
    # break on either Unix platform.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run install.sh (core, no onboarding)
        run: |
          test -x ./install.sh || { echo "install.sh is not executable"; exit 1; }
          python -c "import sys; sys.exit(1 if b'\r' in open('install.sh','rb').read() else 0)" \
            || { echo "install.sh has CRLF line endings"; exit 1; }
          ./install.sh --no-configure --venv .venv
      - name: Verify the installed CLI works
        run: |
          ./.venv/bin/praxis demo
          ./.venv/bin/praxis onboard --provider ollama --model llama3.1
          ./.venv/bin/praxis route

  install-script-windows:
    # Exercise the PowerShell bootstrap so the Windows install path (venv
    # Scripts layout, praxis.exe shim) is verified too.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run install.ps1 (core, no onboarding)
        shell: pwsh
        run: ./install.ps1 -NoConfigure -Venv .venv
      - name: Verify the installed CLI works
        shell: pwsh
        run: |
          .\.venv\Scripts\praxis.exe demo
          .\.venv\Scripts\praxis.exe onboard --provider ollama --model llama3.1
          .\.venv\Scripts\praxis.exe route

  mutation:
    # Manual-only: mutation testing is slow, so it never gates the PR matrix.
    # Trigger from the Actions tab ("Run workflow") to audit the governance core.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mutation]"
      - name: Mutation-test the governance broker
        run: python scripts/mutation_test.py --fail-over 10

  docker:
    # Build the image and smoke-test the containerized dashboard so the Dockerfile
    # (multi-stage build, bundled web/ assets, 0.0.0.0 binding) can't silently rot.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t praxis-agent:ci .
      - name: Run container and probe the dashboard
        run: |
          docker run -d --name praxis -p 127.0.0.1:8643:8643 praxis-agent:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8643/status >/dev/null 2>&1; then
              echo "dashboard is up"; ok=1; break
            fi
            sleep 2
          done
          # The dashboard HTML must reference the bundled web/ assets and serve them.
          curl -fsS http://127.0.0.1:8643/ | grep -q "/web/safety.js"
          curl -fsS http://127.0.0.1:8643/web/safety.js | head -c 1 >/dev/null
          docker logs praxis | tail -n 20
          docker rm -f praxis
          test "${ok:-0}" = "1"

