name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy hybridagent

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage gate
        run: pytest -q --cov=hybridagent --cov-report=term-missing --cov-fail-under=80
      - name: Smoke-test demo + CLI
        run: |
          python demo.py
          praxis demo

  install-script:
    # Exercise the one-command bootstrap on Linux so the documented install path
    # (and its LF line endings / executable bit) can't silently break.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run install.sh (core, no onboarding)
        run: |
          test -x ./install.sh || { echo "install.sh is not executable"; exit 1; }
          ! grep -lU $'\r' install.sh || { echo "install.sh has CRLF line endings"; exit 1; }
          ./install.sh --no-configure --venv .venv
      - name: Verify the installed CLI works
        run: |
          ./.venv/bin/praxis demo
          ./.venv/bin/praxis onboard --provider ollama --model llama3.1
          ./.venv/bin/praxis route

  mutation:
    # Manual-only: mutation testing is slow, so it never gates the PR matrix.
    # Trigger from the Actions tab ("Run workflow") to audit the governance core.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mutation]"
      - name: Mutation-test the governance broker
        run: python scripts/mutation_test.py --fail-over 10
