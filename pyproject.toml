[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "praxis-agent"
version = "0.1.0"
description = "Hybrid OpenClaw + Hermes autonomous AI colleague (proactive + governed)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "SMF Works" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
praxis = "hybridagent.cli:main"

[tool.setuptools]
packages = ["hybridagent"]
